<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Untitled</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SceneScribe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <div class="menu-wrapper">
          <button
            class="menu-button"
            id="menuButton"
            onclick="toggleMenu()"
            aria-label="Open menu"
            title="Menu"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <div id="menuDropdown" class="menu-dropdown">
            <button onclick="goToDashboard()">Dashboard</button>
            <button onclick="openUploadsPage()">Uploads</button>
            <button onclick="openFoldersPage()">Folders</button>
            <button onclick="openSettingsPage()">Settings</button>
          </div>
        </div>
      </div>

      <div class="topbar-center">
        <div class="brand">
          <div class="logo">S</div>
          <div class="name">SceneScribe</div>
        </div>
      </div>

      <div class="topbar-right">
        <button class="profile-button" aria-label="Profile" title="Profile">
          <svg viewBox="0 0 24 24" class="profile-icon" aria-hidden="true">
            <path d="M12 12c2.761 0 5-2.462 5-5.5S14.761 1 12 1 7 3.462 7 6.5 9.239 12 12 12Zm0 2c-4.418 0-8 2.91-8 6.5 0 .276.224.5.5.5h15c.276 0 .5-.224.5-.5 0-3.59-3.582-6.5-8-6.5Z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="container">
      <section class="left-column">
        <div class="video-card">
          <div class="video-shell">
            <video id="video" controls autoplay muted loop>
              <source
                src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
                type="video/mp4"
              />
              Your browser does not support the video tag.
            </video>
          </div>

          <div class="video-info">
            <div class="video-info-left">
              <div class="video-label">Now Playing</div>
              <div id="videoTitle" class="video-title">Flower Demo</div>
            </div>

            <div class="video-info-right">
              <div class="video-label right-label">Length</div>
              <div id="videoLength" class="video-length">0:00:00</div>
            </div>
          </div>

          <input id="videoUpload" type="file" accept="video/*" />
        </div>

        <div class="info-card">
          <div class="section-header">
            <h3>Summary</h3>
            <button
              id="summaryActionButton"
              class="icon-button action-mini-button"
              onclick="handleSummaryAction()"
              aria-label="Generate summary"
              title="Generate summary"
            >
              +
            </button>
          </div>

          <div class="compact-content-box">
            <div id="summary" class="generated-text">No summary yet.</div>
          </div>
        </div>

        <div class="info-card">
          <div class="section-header">
            <h3>Key Takeaways</h3>
            <button
              id="takeawaysActionButton"
              class="icon-button action-mini-button"
              onclick="handleTakeawaysAction()"
              aria-label="Generate takeaways"
              title="Generate takeaways"
            >
              +
            </button>
          </div>

          <div class="compact-content-box">
            <div id="takeaways" class="generated-text">No takeaways yet.</div>
          </div>
        </div>
      </section>

      <section class="right-column">
        <div class="main-card">
          <div class="tabs-header">
            <div class="tabs">
              <button class="tab-button active" onclick="switchTab('transcript', this)">Transcript</button>
              <button class="tab-button" onclick="switchTab('notes', this)">Notes</button>
              <button class="tab-button" onclick="switchTab('comments', this)">Comments</button>
              <button class="tab-button" onclick="switchTab('ai', this)">AI Chat</button>
              <button class="tab-button" onclick="switchTab('quiz', this)">Quiz</button>
            </div>
          </div>

          <div id="transcriptTab" class="tab-content active">
            <div class="tab-tools-row">
              <button id="exportTranscriptButton" class="export-button" onclick="exportTranscript()">
                <svg viewBox="0 0 24 24" class="export-icon" aria-hidden="true">
                  <path d="M12 3a1 1 0 0 1 1 1v8.586l2.293-2.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 0 1 1.414-1.414L11 12.586V4a1 1 0 0 1 1-1Zm-7 14a1 1 0 0 1 1 1v1h12v-1a1 1 0 1 1 2 0v2a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1Z"/>
                </svg>
                <span>Export Transcript</span>
              </button>

              <div class="content-actions">
                <button class="square-action-button" onclick="shareTranscript()" aria-label="Share" title="Share">
                  <svg viewBox="0 0 24 24" class="square-action-icon" aria-hidden="true">
                    <path d="M18 16a2.98 2.98 0 0 0-2.24 1.02l-6.31-3.5a3.1 3.1 0 0 0 0-1.04l6.31-3.5A3 3 0 1 0 15 7a3.1 3.1 0 0 0 .04.5l-6.31 3.5a3 3 0 1 0 0 1.99l6.31 3.5A3 3 0 1 0 18 16Z"/>
                  </svg>
                </button>

                <div class="more-menu-wrapper">
                  <button
                    class="square-action-button"
                    onclick="toggleTranscriptMoreMenu()"
                    aria-label="More"
                    title="More"
                  >
                    <svg viewBox="0 0 24 24" class="square-action-icon" aria-hidden="true">
                      <path d="M6 10.5A1.5 1.5 0 1 1 6 13.5 1.5 1.5 0 0 1 6 10.5Zm6 0A1.5 1.5 0 1 1 12 13.5 1.5 1.5 0 0 1 12 10.5Zm6 0A1.5 1.5 0 1 1 18 13.5 1.5 1.5 0 0 1 18 10.5Z"/>
                    </svg>
                  </button>

                  <div id="transcriptMoreMenu" class="transcript-more-menu">
                    <button onclick="retranscribeFile()">Retranscribe</button>
                    <button onclick="renameTranscript()">Rename</button>
                    <button onclick="moveTranscript()">Move</button>
                    <hr />
                    <button class="danger-item" onclick="deleteOriginalFile()">Delete Original File</button>
                    <button class="danger-item" onclick="deleteTranscript()">Delete Transcript</button>
                  </div>
                </div>
              </div>
            </div>

            <div id="transcriptScroll" class="transcript-scroll"></div>
          </div>

          <div id="notesTab" class="tab-content">
            <div class="notes-panel">
              <textarea
                id="noteDocInput"
                class="notes-textarea"
                placeholder="Start writing your notes here..."
              ></textarea>

              <div class="notes-save-bar">
                <button id="saveNotesButton" class="primary-button" onclick="saveNoteDoc()">
                  Save
                </button>
              </div>
            </div>
          </div>

          <div id="commentsTab" class="tab-content">
            <div class="comments-panel">
              <div class="comments-top-inside">
                <div id="commentsTimeLabel" class="time-pill">0:00:00</div>
              </div>

              <div id="commentsList" class="message-scroll compact-message-scroll">
                <div class="empty-state">No comments yet.</div>
              </div>

              <div class="input-area compact-input-area">
                <div class="input-wrap">
                  <textarea
                    id="commentInput"
                    placeholder="Write a comment at this timestamp..."
                  ></textarea>
                  <button class="primary-button inside-button" onclick="addComment()">Add</button>
                </div>
              </div>
            </div>
          </div>

          <div id="aiTab" class="tab-content">
            <p class="subtext subtext-tight">Ask questions about the video, transcript, notes, or comments.</p>

            <div class="ai-layout">
              <div id="aiMessages" class="message-scroll compact-message-scroll">
                <div class="empty-state">No questions yet.</div>
              </div>

              <div class="input-area compact-input-area">
                <div class="input-wrap ai-input-wrap">
                  <textarea
                    id="aiInput"
                    placeholder="Ask anything..."
                  ></textarea>

                  <div class="ai-actions">
                    <button class="primary-button small-pill" onclick="askAI()">Send</button>
                    <button
                      id="aiActionButton"
                      class="icon-button action-mini-button"
                      onclick="handleAIAction()"
                      aria-label="Generate AI response"
                      title="Generate AI response"
                    >
                      +
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div id="quizTab" class="tab-content">
            <div class="tab-tools-row quiz-tools-row">
              <button class="primary-button" onclick="generateQuiz()">Generate Quiz</button>
            </div>

            <div class="quiz-layout">
              <div id="quizContainer" class="quiz-flat">
                <div class="empty-state">No quiz yet.</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <label for="videoUpload" class="floating-upload-button">
      Upload New
    </label>
  </div>

  <script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
